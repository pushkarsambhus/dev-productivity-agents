# ==============================================================================
# REDIS DEPLOYMENT
# ==============================================================================
#
# WHAT IS A DEPLOYMENT?
# A Deployment manages a set of identical Pods
# - Ensures desired number of Pods are running
# - Handles rolling updates (gradual replacement of old Pods)
# - Enables rollback if something goes wrong
# - Self-healing: Replaces failed Pods automatically
#
# POD:
# - Smallest deployable unit in Kubernetes
# - Contains one or more containers
# - Shares network and storage
# - Ephemeral (can be destroyed and recreated)
#
# REPLICA:
# - Number of Pod copies running
# - For high availability (if one dies, others handle traffic)
# - For load distribution
#
# INTERVIEW TIP: Deployment → ReplicaSet → Pods
# - You create Deployment
# - Deployment creates ReplicaSet
# - ReplicaSet creates Pods
# (You rarely interact with ReplicaSet directly)
#
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: interview-prep
  labels:
    app: redis
    tier: cache
spec:
  # REPLICAS: Number of Pod instances
  # INTERVIEW TIP: For Redis (stateful), usually 1 replica in basic setup
  # In production with high availability:
  # - Use StatefulSet instead of Deployment
  # - Redis Sentinel for failover
  # - Redis Cluster for sharding
  replicas: 1

  # SELECTOR: How Deployment finds its Pods
  # CONCEPT: Labels and selectors are how K8s connects resources
  # - Pods have labels
  # - Deployment selects Pods by labels
  # - Must match template.metadata.labels below
  selector:
    matchLabels:
      app: redis
      tier: cache

  # TEMPLATE: Blueprint for creating Pods
  template:
    metadata:
      labels:
        app: redis
        tier: cache
    spec:
      # CONTAINERS: List of containers in this Pod
      # CONCEPT: Usually one container per Pod (microservices)
      # But can have multiple (sidecar pattern)
      containers:
      - name: redis
        # IMAGE: Container image to run
        # CONCEPT: K8s pulls from registry (Docker Hub, ECR, GCR)
        image: redis:7-alpine
        # IMAGE PULL POLICY:
        # - IfNotPresent: Use cached image if available (default)
        # - Always: Always pull latest
        # - Never: Never pull, use local only
        imagePullPolicy: IfNotPresent

        # PORTS: Expose container ports
        # CONCEPT: This is documentation + service discovery
        # Doesn't actually publish ports (Service does that)
        ports:
        - containerPort: 6379
          name: redis
          protocol: TCP

        # RESOURCES: CPU and memory limits
        # CONCEPT: Resource management prevents one pod from hogging resources
        # requests: What pod needs (guaranteed)
        # limits: Maximum pod can use
        #
        # INTERVIEW TIP: CPU is compressible (throttled if over limit)
        # Memory is not (pod killed if over limit - OOMKilled)
        resources:
          requests:
            memory: "128Mi"    # Minimum guaranteed memory
            cpu: "100m"        # 100 millicores = 0.1 CPU
          limits:
            memory: "256Mi"    # Maximum memory (killed if exceeded)
            cpu: "200m"        # Maximum CPU (throttled if exceeded)

        # LIVENESS PROBE: Is the container running?
        # CONCEPT: If fails, K8s restarts container
        # USE CASE: Detect deadlocks, infinite loops
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 15  # Wait before first check
          periodSeconds: 10        # Check every 10 seconds
          timeoutSeconds: 3        # Fail if no response in 3 seconds
          failureThreshold: 3      # Restart after 3 failures

        # READINESS PROBE: Is the container ready to serve traffic?
        # CONCEPT: If fails, K8s removes from Service endpoints
        # DIFFERENCE from liveness:
        # - Liveness: Is it alive? (restart if not)
        # - Readiness: Is it ready? (don't send traffic if not)
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        # VOLUME MOUNTS: Where to mount volumes in container
        volumeMounts:
        - name: redis-data
          mountPath: /data  # Redis stores data here

      # VOLUMES: Storage for Pod
      # CONCEPT: Volumes persist data beyond container lifecycle
      # emptyDir: Temporary storage (deleted when Pod dies)
      # persistentVolumeClaim: Persistent storage (survives Pod deletion)
      volumes:
      - name: redis-data
        emptyDir: {}  # Simple temporary storage for demo
        # In production, use PersistentVolumeClaim:
        # persistentVolumeClaim:
        #   claimName: redis-pvc

---
# ==============================================================================
# REDIS SERVICE
# ==============================================================================
#
# WHAT IS A SERVICE?
# A Service is a stable network endpoint for accessing Pods
# - Pods are ephemeral (IPs change when they restart)
# - Service provides a stable IP and DNS name
# - Load balances traffic across Pod replicas
#
# SERVICE TYPES:
# - ClusterIP: Internal only (default) - what we use
# - NodePort: Accessible from outside cluster on node IP:port
# - LoadBalancer: Cloud load balancer (AWS ELB, GCP LB)
# - ExternalName: DNS alias to external service
#
# INTERVIEW TIP: Service Discovery
# - Services get DNS: <service-name>.<namespace>.svc.cluster.local
# - Pods in same namespace can use just <service-name>
# - Example: "redis" resolves to this service
#
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: interview-prep
  labels:
    app: redis
    tier: cache
spec:
  # TYPE: ClusterIP for internal-only access
  type: ClusterIP

  # SELECTOR: Which Pods this Service routes to
  # CONCEPT: Service finds Pods with matching labels
  selector:
    app: redis
    tier: cache

  # PORTS: Port mappings
  # port: Service port (what clients connect to)
  # targetPort: Container port (where traffic goes)
  ports:
  - port: 6379        # Service listens on 6379
    targetPort: 6379  # Forward to container port 6379
    protocol: TCP
    name: redis

  # SESSION AFFINITY: Stick sessions to same pod
  # None: Random pod each time (default)
  # ClientIP: Same client → same pod
  sessionAffinity: None

# ==============================================================================
# USAGE
# ==============================================================================
#
# Deploy Redis:
#   kubectl apply -f k8s/redis-deployment.yaml
#
# Check deployment status:
#   kubectl get deployment redis -n interview-prep
#   kubectl rollout status deployment/redis -n interview-prep
#
# View pods:
#   kubectl get pods -n interview-prep -l app=redis
#
# View service:
#   kubectl get service redis -n interview-prep
#
# Describe service (see endpoints):
#   kubectl describe service redis -n interview-prep
#
# Access Redis from another pod:
#   kubectl run -it --rm redis-client --image=redis:7-alpine -n interview-prep -- redis-cli -h redis
#
# View logs:
#   kubectl logs -f deployment/redis -n interview-prep
#
# Scale deployment:
#   kubectl scale deployment/redis --replicas=3 -n interview-prep
#
# Delete:
#   kubectl delete -f k8s/redis-deployment.yaml
#
# ==============================================================================
# INTERVIEW TALKING POINTS
# ==============================================================================
#
# 1. Deployment vs StatefulSet:
#    Deployment (what we used):
#    - For stateless apps
#    - Pods are interchangeable
#    - No stable network identity
#    - Example: Web servers, APIs
#
#    StatefulSet (better for Redis):
#    - For stateful apps
#    - Stable pod names (redis-0, redis-1)
#    - Ordered deployment/deletion
#    - Persistent storage per pod
#    - Example: Databases, Redis, Kafka
#
# 2. Rolling Updates:
#    - Change image version in Deployment
#    - K8s gradually replaces Pods
#    - Zero downtime deployment
#    - Can rollback if issues detected
#
# 3. Self-Healing:
#    - Pod crashes → K8s restarts it
#    - Node fails → K8s reschedules Pods elsewhere
#    - Health check fails → K8s restarts/removes Pod
#
# 4. Resource Management:
#    - requests: Scheduling decision (node has enough?)
#    - limits: Runtime enforcement (kill if exceeded)
#    - QoS classes: Guaranteed, Burstable, BestEffort
#
# 5. Probes:
#    - Liveness: Should we restart? (deadlock, hung)
#    - Readiness: Should we send traffic? (warming up, dependencies down)
#    - Startup: Initial check (for slow-starting apps)
#
# 6. Service Discovery:
#    - DNS: Most common (redis.interview-prep.svc.cluster.local)
#    - Environment variables: K8s injects service IPs
#    - API: Query K8s API for endpoints
#
# 7. Production Redis:
#    - Use StatefulSet
#    - PersistentVolume for data
#    - Redis Sentinel for HA
#    - Redis Cluster for sharding
#    - Or use managed service (AWS ElastiCache, GCP Memorystore)
#
# ==============================================================================

# ==============================================================================
# KUBERNETES INGRESS
# ==============================================================================
#
# WHAT IS INGRESS?
# Ingress manages external HTTP/HTTPS access to services in a cluster
# - Acts as a reverse proxy/load balancer
# - Routes traffic based on hostname or path
# - Handles SSL/TLS termination
# - Single entry point for multiple services
#
# ANALOGY: Ingress is like a receptionist at a building
# - Receives visitors (HTTP requests)
# - Directs them to right office (service)
# - Based on who they're looking for (host/path)
#
# INTERVIEW TIP: Ingress vs Service
# - Service: Internal or basic external access (LoadBalancer)
# - Ingress: Advanced routing, SSL, path-based routing
#
# INGRESS CONTROLLER REQUIRED:
# Ingress resource is just configuration. You need a controller to implement it:
# - nginx-ingress (most popular)
# - traefik
# - AWS ALB Ingress Controller (for AWS)
# - GCP Ingress (for GKE)
# - Istio Gateway
#
# IN AWS EKS:
# - AWS Load Balancer Controller creates ALB (Application Load Balancer)
# - Integrates with AWS services (ACM for SSL, WAF for security)
# - Automatically provisions and configures ALB based on Ingress
#
# ==============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: interview-prep-ingress
  namespace: interview-prep
  labels:
    app: interview-prep-api
  annotations:
    # ANNOTATIONS: Configure ingress controller behavior
    # Different controllers support different annotations

    # NGINX Ingress Controller annotations:
    # Class name (which ingress controller to use)
    # kubernetes.io/ingress.class: nginx  # Legacy, use ingressClassName below

    # CORS (Cross-Origin Resource Sharing)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"

    # Rate limiting (protect against abuse)
    nginx.ingress.kubernetes.io/limit-rps: "100"  # 100 requests per second

    # SSL redirect (HTTP → HTTPS)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # AWS ALB Ingress Controller annotations (for EKS):
    # Uncomment if using AWS ALB Ingress Controller
    # alb.ingress.kubernetes.io/scheme: internet-facing  # Or 'internal'
    # alb.ingress.kubernetes.io/target-type: ip  # Or 'instance'
    # alb.ingress.kubernetes.io/healthcheck-path: /health
    # alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    # alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    # alb.ingress.kubernetes.io/success-codes: '200'
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:xxxxx:certificate/xxxxx

spec:
  # INGRESS CLASS: Which ingress controller to use
  # CONCEPT: Can have multiple ingress controllers in same cluster
  # Each handles different ingress classes
  ingressClassName: nginx  # For nginx-ingress
  # ingressClassName: alb  # For AWS ALB Ingress Controller

  # TLS (HTTPS) CONFIGURATION
  # CONCEPT: Ingress can terminate SSL/TLS
  # - Certificate stored in Kubernetes Secret
  # - Traffic between client and ingress is encrypted
  # - Traffic between ingress and service is usually unencrypted (inside cluster)
  #
  # INTERVIEW TIP: In production:
  # - Use cert-manager to automatically get Let's Encrypt certificates
  # - Or AWS ACM (Certificate Manager) with ALB Ingress Controller
  # - Rotate certificates before expiry
  tls:
  - hosts:
    - api.example.com
    secretName: api-tls-cert  # Secret containing TLS cert and key
    # Create secret with:
    # kubectl create secret tls api-tls-cert \
    #   --cert=path/to/cert.pem \
    #   --key=path/to/key.pem \
    #   -n interview-prep

  # ROUTING RULES
  # CONCEPT: How to route incoming traffic to services
  # Can route based on:
  # - Host (domain name)
  # - Path (URL path)
  # - Both
  rules:
  # RULE 1: Route by hostname
  - host: api.example.com  # Replace with your domain
    http:
      paths:
      # Path-based routing
      # INTERVIEW TIP: Useful for microservices
      # api.example.com/users → user-service
      # api.example.com/orders → order-service

      # Route root path to API service
      - path: /
        pathType: Prefix  # Prefix: Matches path and all subpaths
                         # Exact: Matches exact path only
                         # ImplementationSpecific: Controller-dependent
        backend:
          service:
            name: interview-prep-api
            port:
              number: 80

      # Example: Route /cache to different service
      # - path: /cache
      #   pathType: Prefix
      #   backend:
      #     service:
      #       name: cache-admin-service
      #       port:
      #         number: 80

  # RULE 2: Fallback/default rule (no host specified)
  # Catches requests that don't match specific hosts
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: interview-prep-api
            port:
              number: 80

# ==============================================================================
# PATH TYPES EXPLAINED
# ==============================================================================
#
# Prefix:
#   path: /api
#   Matches: /api, /api/, /api/foo, /api/foo/bar
#   Most common, flexible
#
# Exact:
#   path: /api
#   Matches: /api only (not /api/ or /api/foo)
#   Strict matching
#
# ImplementationSpecific:
#   Behavior depends on ingress controller
#   Avoid unless you know what you're doing
#
# ==============================================================================
# USAGE
# ==============================================================================
#
# Install nginx-ingress controller (if not already installed):
#   # Using Helm
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm repo update
#   helm install nginx-ingress ingress-nginx/ingress-nginx
#
#   # Or using kubectl
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.1/deploy/static/provider/cloud/deploy.yaml
#
# Create Ingress:
#   kubectl apply -f k8s/ingress.yaml
#
# View Ingress:
#   kubectl get ingress -n interview-prep
#   kubectl describe ingress interview-prep-ingress -n interview-prep
#
# Get Ingress address:
#   kubectl get ingress interview-prep-ingress -n interview-prep
#   # Look for ADDRESS column (might take a minute to appear)
#
# Test Ingress:
#   # If using cloud provider (LoadBalancer):
#   curl http://<INGRESS-ADDRESS>/health
#
#   # For local testing (minikube, kind):
#   # Get ingress controller's external IP or use port-forward
#
# Delete Ingress:
#   kubectl delete -f k8s/ingress.yaml
#
# ==============================================================================
# INTERVIEW TALKING POINTS - INGRESS
# ==============================================================================
#
# 1. Why Ingress?
#    Without Ingress:
#    - Each service needs its own LoadBalancer (expensive)
#    - No path-based routing
#    - Manual SSL management per service
#
#    With Ingress:
#    - Single LoadBalancer for all services (cost-effective)
#    - Advanced routing (host, path, headers)
#    - Centralized SSL termination
#    - Request rewriting, redirects
#
# 2. Ingress vs LoadBalancer Service:
#    LoadBalancer Service:
#    - Layer 4 (TCP/UDP)
#    - One service = one LB (expensive at scale)
#    - Simple, but limited
#
#    Ingress:
#    - Layer 7 (HTTP/HTTPS)
#    - Many services share one LB
#    - Advanced routing
#    - SSL termination
#
# 3. Production Patterns:
#    Single domain, microservices:
#    - api.example.com/users → user-service
#    - api.example.com/orders → order-service
#    - api.example.com/products → product-service
#
#    Multiple domains:
#    - api.example.com → api-service
#    - admin.example.com → admin-service
#    - www.example.com → frontend-service
#
#    Environment-based:
#    - dev.example.com → dev namespace
#    - staging.example.com → staging namespace
#    - api.example.com → prod namespace
#
# 4. AWS Integration (EKS):
#    AWS Load Balancer Controller:
#    - Creates ALB (Application Load Balancer)
#    - Integrates with AWS WAF (Web Application Firewall)
#    - Uses ACM for SSL certificates (free, auto-renewal)
#    - Target groups map to K8s services
#    - Can use NLB (Network Load Balancer) for TCP
#
#    Architecture:
#    Internet → Route53 (DNS) → ALB → Ingress → Service → Pods
#
# 5. SSL/TLS Management:
#    Manual:
#    - Create certificate (Let's Encrypt, commercial CA)
#    - Create K8s Secret
#    - Reference in Ingress
#
#    Automated (cert-manager):
#    - Automatically gets Let's Encrypt certs
#    - Renews before expiry
#    - Creates K8s Secrets
#    - Integration with Ingress
#
#    AWS (ACM):
#    - Request certificate in ACM
#    - Annotate Ingress with cert ARN
#    - ALB uses ACM cert automatically
#
# 6. Security Best Practices:
#    - Always use HTTPS in production
#    - Redirect HTTP to HTTPS
#    - Use strong SSL ciphers
#    - Enable CORS carefully (not "*" in prod)
#    - Rate limiting to prevent abuse
#    - Web Application Firewall (WAF)
#    - DDoS protection (AWS Shield, Cloudflare)
#
# 7. Monitoring:
#    - Request rate, latency
#    - Error rates (4xx, 5xx)
#    - SSL certificate expiry
#    - Ingress controller health
#    - Backend service health
#
# 8. Common Issues:
#    - 404: Path doesn't match any rule
#    - 503: Backend service not available
#    - 502: Backend service error
#    - SSL errors: Certificate issues
#    - Ingress not getting IP: Controller not installed
#
# 9. Alternatives:
#    - API Gateway (managed service)
#    - Service Mesh (Istio, Linkerd) - includes ingress
#    - Direct LoadBalancer services (simple apps)
#    - NodePort + external LB (manual setup)
#
# 10. Local Development:
#     - Minikube: minikube addons enable ingress
#     - Kind: Install nginx-ingress, port forward
#     - Docker Desktop: Enable Kubernetes, install nginx-ingress
#     - Port-forward for quick testing (no ingress needed)
#
# ==============================================================================

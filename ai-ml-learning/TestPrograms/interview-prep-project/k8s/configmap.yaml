# ==============================================================================
# KUBERNETES CONFIGMAP
# ==============================================================================
#
# WHAT IS A CONFIGMAP?
# ConfigMaps store non-sensitive configuration data as key-value pairs
# - Decouple configuration from application code
# - Change config without rebuilding containers
# - Share config across multiple pods
# - Environment-specific settings (dev vs prod)
#
# CONFIGMAP vs SECRET:
# - ConfigMap: Non-sensitive data (API URLs, feature flags)
# - Secret: Sensitive data (passwords, API keys) - base64 encoded
#
# INTERVIEW TIP: In production:
# - Use ConfigMaps for non-sensitive config
# - Use Secrets for passwords, tokens, keys
# - In AWS: Can integrate with AWS Secrets Manager or Parameter Store
#
# WAYS TO USE CONFIGMAPS:
# 1. Environment variables (what we use)
# 2. Command-line arguments
# 3. Files in a volume
#
# ==============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: interview-prep
  labels:
    app: interview-prep-api
data:
  # Redis configuration
  # CONCEPT: Service discovery in Kubernetes
  # - Services get DNS names: <service-name>.<namespace>.svc.cluster.local
  # - Within same namespace, can use just <service-name>
  # - "redis" resolves to the Redis service we'll create
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Application configuration
  LOG_LEVEL: "INFO"

  # INTERVIEW TIP: In production, you might have:
  # - Different ConfigMaps for different environments
  # - ConfigMaps per microservice
  # - Feature flags stored here
  #
  # Example:
  # FEATURE_FLAG_NEW_UI: "true"
  # API_RATE_LIMIT: "100"
  # CACHE_TTL_SECONDS: "300"

# ==============================================================================
# USAGE
# ==============================================================================
#
# Create ConfigMap:
#   kubectl apply -f k8s/configmap.yaml
#
# View ConfigMap:
#   kubectl get configmap api-config -n interview-prep
#   kubectl describe configmap api-config -n interview-prep
#
# Edit ConfigMap:
#   kubectl edit configmap api-config -n interview-prep
#
# Delete ConfigMap:
#   kubectl delete configmap api-config -n interview-prep
#
# Create ConfigMap from file:
#   kubectl create configmap api-config --from-file=config.json -n interview-prep
#
# Create ConfigMap from literal values:
#   kubectl create configmap api-config --from-literal=REDIS_HOST=redis -n interview-prep
#
# IMPORTANT: Changing ConfigMap doesn't automatically restart pods!
# - Need to restart pods to pick up new values
# - Or use something like Reloader (https://github.com/stakater/Reloader)
#
# ==============================================================================
# INTERVIEW TALKING POINTS
# ==============================================================================
#
# 1. Why ConfigMaps?
#    - Separation of concerns (config separate from code)
#    - Environment portability (same image, different configs)
#    - Centralized configuration
#    - No need to rebuild for config changes
#
# 2. ConfigMap Patterns:
#    - One ConfigMap per application
#    - One ConfigMap per environment (dev-config, prod-config)
#    - Shared ConfigMaps for common settings
#    - Versioned ConfigMaps (api-config-v1, api-config-v2)
#
# 3. Limitations:
#    - Size limit: 1MB per ConfigMap
#    - Not designed for large data
#    - Not encrypted (use Secrets for sensitive data)
#    - Changes don't auto-reload (need pod restart)
#
# 4. AWS Integration:
#    - Can use AWS Systems Manager Parameter Store
#    - Or AWS Secrets Manager
#    - External Secrets Operator syncs to K8s ConfigMaps/Secrets
#
# 5. Best Practices:
#    - Use descriptive names
#    - Add labels for filtering
#    - Version ConfigMaps if needed
#    - Document what each key means
#    - Keep secrets separate
#
# ==============================================================================

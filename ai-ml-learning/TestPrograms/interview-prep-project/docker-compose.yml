# ==============================================================================
# DOCKER COMPOSE - Multi-Container Application Definition
# ==============================================================================
#
# WHAT IS DOCKER COMPOSE?
# Docker Compose is a tool for defining and running multi-container applications
# - Define services (API, database, cache) in one file
# - Start everything with one command: docker-compose up
# - Stop everything with: docker-compose down
#
# WHY USE IT?
# - Development: Easy to run entire stack locally
# - Consistency: Everyone uses same configuration
# - Documentation: Shows how services connect
# - Testing: Spin up isolated test environments
#
# INTERVIEW TIP: Docker Compose is for single-host deployments
# - For production multi-host: Use Kubernetes, Docker Swarm, or ECS
#
# ==============================================================================

version: '3.8'

# CONCEPT: Services are containers that work together
services:

  # ----------------------------------------------------------------------------
  # API Service - Our FastAPI application
  # ----------------------------------------------------------------------------
  api:
    # Build from local Dockerfile
    build:
      context: .
      dockerfile: Dockerfile

    # Container name (easier to reference than generated name)
    container_name: interview-prep-api

    # Restart policy
    # CONCEPT: What to do if container exits
    # - no: Don't restart
    # - always: Always restart
    # - on-failure: Restart only if exit code is non-zero
    # - unless-stopped: Always restart unless manually stopped
    restart: unless-stopped

    # Port mapping: host:container
    # CONCEPT: Map port 8000 on your machine to port 8000 in container
    ports:
      - "8000:8000"

    # Environment variables
    # CONCEPT: Configuration without changing code
    environment:
      - REDIS_HOST=redis          # Service name (Docker DNS resolves this)
      - REDIS_PORT=6379
      - REDIS_DB=0

    # Dependencies
    # CONCEPT: Start redis before api
    # NOTE: depends_on only waits for container to start, not for it to be ready
    # In production, implement retry logic in your app
    depends_on:
      - redis

    # Networks
    # CONCEPT: Containers on same network can communicate
    networks:
      - app-network

    # Volume mounts (for development)
    # CONCEPT: Map local directory to container directory
    # - Changes to local files appear in container immediately
    # - No need to rebuild for code changes
    # INTERVIEW TIP: In production, code is baked into image (no volumes)
    volumes:
      - ./app:/app/app:ro  # ro = read-only

  # ----------------------------------------------------------------------------
  # Redis Service - Caching layer
  # ----------------------------------------------------------------------------
  redis:
    # Use official Redis image from Docker Hub
    # CONCEPT: Don't build what already exists
    # - Official images are maintained and secure
    # - Pin version for consistency (not 'latest')
    image: redis:7-alpine  # alpine = minimal Linux distro (smaller image)

    container_name: interview-prep-redis

    restart: unless-stopped

    # Port mapping (optional - only if you want to access Redis from host)
    ports:
      - "6379:6379"

    # Command to run Redis with custom options
    # CONCEPT: Override default CMD
    # --maxmemory: Limit memory usage (prevents OOM)
    # --maxmemory-policy: What to do when memory is full
    #   - allkeys-lru: Remove least recently used keys
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

    # Volume for data persistence
    # CONCEPT: Named volumes persist data even after container stops
    # - Without volume, data is lost when container is removed
    # - Named volumes are managed by Docker
    volumes:
      - redis-data:/data

    networks:
      - app-network

    # Health check
    # CONCEPT: Check if Redis is ready
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

# ------------------------------------------------------------------------------
# Networks
# ------------------------------------------------------------------------------
# CONCEPT: Custom networks for container communication
# - Containers on same network can talk to each other
# - Use service names as hostnames (Docker provides DNS)
# - Isolated from other Docker networks
networks:
  app-network:
    driver: bridge  # bridge = default network driver for single host

# ------------------------------------------------------------------------------
# Volumes
# ------------------------------------------------------------------------------
# CONCEPT: Persistent storage for containers
# - Named volumes are managed by Docker
# - Data persists across container restarts
# - Can be backed up and restored
volumes:
  redis-data:
    driver: local  # local = store on host machine

# ==============================================================================
# DOCKER COMPOSE COMMANDS
# ==============================================================================
#
# Start all services:
#   docker-compose up
#   (Add -d for detached/background mode)
#
# Build and start:
#   docker-compose up --build
#   (Rebuild images before starting)
#
# Stop all services:
#   docker-compose down
#
# Stop and remove volumes:
#   docker-compose down -v
#   (Warning: This deletes Redis data!)
#
# View logs:
#   docker-compose logs
#   docker-compose logs -f api    (follow logs for api service)
#
# Execute command in service:
#   docker-compose exec api /bin/bash
#   docker-compose exec redis redis-cli
#
# View running services:
#   docker-compose ps
#
# Restart a service:
#   docker-compose restart api
#
# Scale a service (run multiple instances):
#   docker-compose up --scale api=3
#   (Need to remove port mapping or use port range)
#
# ==============================================================================
# INTERVIEW TALKING POINTS - DOCKER COMPOSE
# ==============================================================================
#
# 1. When to use Docker Compose:
#    - Local development (multi-service apps)
#    - Integration testing
#    - Small production deployments (single host)
#    - Demo/PoC environments
#
# 2. When NOT to use Docker Compose:
#    - Production multi-host deployments → Use Kubernetes/ECS
#    - Need auto-scaling → Use orchestrator
#    - High availability required → Use distributed system
#    - Need service discovery → Use orchestrator
#
# 3. Compose vs Kubernetes:
#    Docker Compose:
#    - Single host
#    - Simple YAML
#    - Quick setup
#    - Good for dev/test
#
#    Kubernetes:
#    - Multi-host cluster
#    - Complex (but powerful)
#    - Auto-scaling, self-healing
#    - Production-grade
#
# 4. Environment Variables:
#    - Hardcoded (like above)
#    - From .env file (docker-compose automatically loads it)
#    - From shell environment
#    Priority: shell > .env file > compose file
#
# 5. Networking:
#    - Bridge: Default, single host
#    - Host: Container uses host network (no isolation)
#    - Overlay: Multi-host networking (Docker Swarm)
#    - None: No networking
#
# 6. Volumes:
#    Types:
#    - Named volumes: Managed by Docker (what we used)
#    - Bind mounts: Map host directory to container
#    - tmpfs: In-memory filesystem
#
# 7. Common Patterns:
#    - API + Database + Cache (what we have)
#    - API + Database + Message Queue (add RabbitMQ/Kafka)
#    - Frontend + Backend + Database (full-stack)
#    - Microservices (multiple APIs)
#
# 8. Development Workflow:
#    1. docker-compose up -d (start in background)
#    2. Make code changes (reflected via volume mount)
#    3. docker-compose logs -f api (watch logs)
#    4. docker-compose restart api (if needed)
#    5. docker-compose down (when done)
#
# 9. Troubleshooting:
#    - Can't connect to service: Check network, depends_on
#    - Port already in use: Change host port
#    - Out of memory: Check resource limits
#    - Slow startup: Check depends_on, add healthchecks
#
# 10. Production Migration:
#     Docker Compose → Kubernetes:
#     - Compose service → K8s Deployment
#     - Port mapping → K8s Service
#     - Environment vars → ConfigMap/Secret
#     - Volume → PersistentVolumeClaim
#     - Network → K8s Service (internal DNS)
#
#     Tools to help: kompose (converts Compose to K8s)
#
# ==============================================================================
